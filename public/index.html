<!DOCTYPE html>
<html lang="en">
<link rel="stylesheet" href="index.css">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text Analyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <h1>Text <span>Analyzer</span></h1>
      <p class="subtitle">Enter text to generate a summary and extract action items. (Max length: 2000)</p>
    </header>

    <div class="card">
      <div class="card-label">Input</div>
      <textarea maxlength="2000" id="textInput" placeholder="Paste your text here — meeting notes, emails, articles, anything..."></textarea>
      <div class="char-count"><span id="charCount">0</span> characters</div>
      <button id="analyzeBtn" onclick="analyze()">
        <div class="btn-inner">
          <div class="spinner"></div>
          <span class="btn-text">Analyze Text</span>
        </div>
      </button>
    </div>

    <div class="error-card" id="errorCard"></div>

    <div class="results" id="results">
      <div class="result-card summary-card">
        <div class="result-label">Summary</div>
        <p class="summary-text" id="summaryText"></p>
      </div>
      <div class="result-card actions-card">
        <div class="result-label">Action Items</div>
        <ul class="action-list" id="actionList"></ul>
      </div>
    </div>

    <footer>POST /analyze &nbsp;·&nbsp; Gemini 3.0 Flash Preview &nbsp;·&nbsp; Express + TypeScript</footer>
  </div>

  <script>
    const textarea = document.getElementById('textInput');
    const charCount = document.getElementById('charCount');
    const btn = document.getElementById('analyzeBtn');
    const results = document.getElementById('results');
    const errorCard = document.getElementById('errorCard');

    textarea.addEventListener('input', () => {
      charCount.textContent = textarea.value.length;
    });

    async function analyze() {
      const text = textarea.value.trim();
      if (!text) return;

      // Reset UI
      results.classList.remove('visible');
      errorCard.classList.remove('visible');
      btn.disabled = true;
      btn.classList.add('loading');
      btn.querySelector('.btn-text').textContent = 'Analyzing...';

      try {
        const res = await fetch('/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Something went wrong.');
        }

        // Populate summary
        document.getElementById('summaryText').textContent = data.summary;

        // Populate action items
        const list = document.getElementById('actionList');
        list.innerHTML = '';
        data.action_items.forEach((item, i) => {
          const li = document.createElement('li');
          li.className = 'action-item';
          li.innerHTML = `<span class="action-num">0${i + 1}</span><span>${item}</span>`;
          list.appendChild(li);
        });

        results.classList.add('visible');
      } catch (err) {
        errorCard.textContent = `Error: ${err.message}`;
        errorCard.classList.add('visible');
      } finally {
        btn.disabled = false;
        btn.classList.remove('loading');
        btn.querySelector('.btn-text').textContent = 'Analyze Text';
      }
    }

    // Allow Ctrl+Enter for submit (common key entry)
    textarea.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) analyze();
    });
  </script>
</body>
</html>
